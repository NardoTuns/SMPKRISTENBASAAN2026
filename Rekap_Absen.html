<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Absensi Siswa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .filter-section { background: #e9ecef; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .filter-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; max-width: 250px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-group label { font-weight: normal; display: inline-flex; align-items: center; background: #fff; padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
        .checkbox-group input { margin-right: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #0056b3; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .status-hadir { color: green; font-weight: bold; }
        .status-sakit { color: orange; font-weight: bold; }
        .status-izin { color: blue; font-weight: bold; }
        .status-alpa { color: red; font-weight: bold; }
        #loading { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rekap Data Absensi</h2>
    
    <div class="filter-section">
        <div class="filter-group">
            <label for="filterTanggal">Pilih Tanggal:</label>
            <input type="date" id="filterTanggal" onchange="terapkanFilter()">
        </div>
        <div class="filter-group">
            <label>Centang Mata Pelajaran:</label>
            <div class="checkbox-group" id="containerMapel">
                </div>
        </div>
    </div>

    <div id="loading">Memuat data dari server...</div>

    <div style="overflow-x:auto;">
        <table id="tabelAbsen" style="display:none;">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Kelas</th>
                    <th>Mapel</th>
                    <th>Tanggal</th>
                    <th>ID Siswa</th>
                    <th>Nama</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="bodyTabel">
                </tbody>
        </table>
    </div>
</div>

<script>
    // MASUKAN URL WEB APP ANDA DI BAWAH INI (Tambahkan ?action=rekap di ujungnya)
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbyHBP3NOzyeiK7Wo8_tqCuQa4aGVuJQ_F-C93AzwRHV6tBQsLi5R2L6G75TJv8NFI4Z/exec?action=rekap'; 
    let dataAbsenGlobal = [];

    // Fungsi untuk mengambil data saat halaman dibuka
    window.onload = function() {
        fetch(scriptUrl)
            .then(response => response.json())
            .then(data => {
                dataAbsenGlobal = data;
                buatCheckboxMapel(data);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tabelAbsen').style.display = 'table';
                terapkanFilter(); // Tampilkan semua data di awal
            })
            .catch(error => {
                document.getElementById('loading').innerText = 'Gagal memuat data. Periksa koneksi atau URL script.';
                console.error('Error:', error);
            });
    }

    // Fungsi membuat checkbox otomatis berdasarkan data Mapel yang ada di database
    function buatCheckboxMapel(data) {
        const mapelUnik = [...new Set(data.map(item => item.mapel))].filter(m => m);
        const container = document.getElementById('containerMapel');
        
        mapelUnik.forEach(mapel => {
            const label = document.createElement('label');
            label.innerHTML = `<input type="checkbox" value="${mapel}" onchange="terapkanFilter()" checked> ${mapel}`;
            container.appendChild(label);
        });
    }

    // Fungsi utama untuk memfilter dan menampilkan tabel
    function terapkanFilter() {
        const tanggalDipilih = document.getElementById('filterTanggal').value;
        
        // Ambil semua mapel yang dicentang
        const checkboxMapel = document.querySelectorAll('#containerMapel input[type="checkbox"]:checked');
        const mapelDipilih = Array.from(checkboxMapel).map(cb => cb.value);

        const tbody = document.getElementById('bodyTabel');
        tbody.innerHTML = ''; // Bersihkan tabel

        // Filter data
        const dataTersaring = dataAbsenGlobal.filter(item => {
            const cocokTanggal = tanggalDipilih === "" || item.tanggal === tanggalDipilih;
            const cocokMapel = mapelDipilih.includes(item.mapel);
            return cocokTanggal && cocokMapel;
        });

        // Masukkan data ke tabel
        dataTersaring.forEach(item => {
            const tr = document.createElement('tr');
            
            // Format waktu (opsional)
            const waktuObj = new Date(item.waktu);
            const waktuTeks = waktuObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            // Warna status
            let classStatus = '';
            if(item.status.toLowerCase() === 'hadir') classStatus = 'status-hadir';
            else if(item.status.toLowerCase() === 'sakit') classStatus = 'status-sakit';
            else if(item.status.toLowerCase() === 'izin') classStatus = 'status-izin';
            else if(item.status.toLowerCase() === 'alpa') classStatus = 'status-alpa';

            tr.innerHTML = `
                <td>${waktuTeks}</td>
                <td>${item.kelas}</td>
                <td>${item.mapel}</td>
                <td>${item.tanggal}</td>
                <td>${item.id_siswa}</td>
                <td>${item.nama}</td>
                <td class="${classStatus}">${item.status}</td>
            `;
            tbody.appendChild(tr);
        });

        if(dataTersaring.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Tidak ada data yang sesuai dengan filter.</td></tr>';
        }
    }
</script>

</body>
</html>
