<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assesmen Akhir Semester 2026 - Sistem Ujian V2.0</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #FF6B6B; 
            --secondary: #4ECDC4; 
            --bg-color: #F7FFF7; 
            --panel-bg: #FFFFFF;
            --text-main: #2D3436; 
            --text-muted: #636E72;
            --error: #FF4757; 
            --success: #2ED573; 
            --soft-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; padding: 15px; 
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            width: 100%; max-width: 700px; 
            margin: auto; padding: 35px 30px; 
            background: var(--panel-bg); 
            border: none; 
            border-radius: 25px; 
            box-shadow: var(--soft-shadow); 
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 10px;
            background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4, #A8E6CF);
        }

        h1, h2 { 
            text-align: center; 
            font-family: 'Fredoka', sans-serif; 
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        h1 { font-size: 1.8rem; color: var(--primary); text-shadow: 2px 2px 0px rgba(255, 107, 107, 0.1); }
        h2 { font-size: 1.1rem; color: var(--secondary); margin-bottom: 30px;}

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-muted); font-size: 0.9rem;}
        
        select, input[type="password"] { 
            width: 100%; padding: 15px; 
            background: #F4F6F8; 
            border: 2px solid #E2E8F0; 
            color: var(--text-main); 
            font-family: 'Nunito', sans-serif; 
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px; 
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
        }
        select:focus, input[type="password"]:focus {
            border-color: var(--secondary);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.2);
        }

        button { 
            background: var(--primary); 
            color: #ffffff; 
            border: none; 
            padding: 16px 20px; 
            width: 100%; 
            border-radius: 15px; 
            cursor: pointer; 
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem; 
            font-weight: 600; 
            letter-spacing: 1px;
            transition: all 0.3s ease; 
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.3);
            margin-top: 15px;
        }
        button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
            filter: brightness(1.1);
        }
        button:disabled { 
            background: #E2E8F0 !important; color: #A0AEC0 !important; 
            cursor: not-allowed; box-shadow: none; transform: none;
        }
        
        .hidden { display: none !important; }
        
        .header-ujian { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #F8FAFC;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 25px; 
            font-family: 'Fredoka', sans-serif;
            color: var(--text-muted);
            border: 2px solid #E2E8F0;
        }
        .header-ujian div:first-child { font-weight: 600; color: var(--secondary); }
        .timer { font-size: 1.6rem; font-weight: 600; color: var(--error); background: #FFF0F0; padding: 5px 15px; border-radius: 10px; }
        
        .soal-container { margin-bottom: 30px; font-size: 1.15rem; line-height: 1.7; font-weight: 600; color: var(--text-main);}
        .soal-container img { max-width: 100%; max-height: 250px; display: block; margin: 15px auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        
        .opsi-label { 
            display: flex; align-items: center; padding: 15px 20px; margin: 12px 0; 
            border: 2px solid #E2E8F0; border-radius: 15px; 
            cursor: pointer; transition: all 0.2s ease; 
            background: #FFFFFF;
        }
        .opsi-label:hover { 
            background: #F0FBFA; 
            border-color: var(--secondary); 
            transform: translateX(5px);
        }
        .opsi-label:has(input[type="radio"]:checked) {
            background: #E6F9F7;
            border-color: var(--secondary);
            box-shadow: 0 4px 10px rgba(78, 205, 196, 0.15);
        }
        input[type="radio"] { accent-color: var(--secondary); width: 1.4rem; height: 1.4rem; margin-right: 15px; flex-shrink: 0;}
        input[type="radio"]:disabled { cursor: not-allowed; }
        .opsi-label:has(input[type="radio"]:disabled) { opacity: 0.6; cursor: not-allowed; transform: none; background: #F8FAFC;}
        
        .stats { 
            display: flex; justify-content: space-around; 
            background: #FFFFFF; padding: 15px; 
            border-radius: 15px; margin-bottom: 20px; 
            border: 2px solid #E2E8F0;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .stats div { text-align: center; font-size: 0.9rem; font-weight: 600;}
        .stats span { display: block; font-size: 1.4rem; margin-top: 5px;}

        .score-board {
            text-align: center; margin-top: 30px; font-size: 1.2rem; font-weight: 600;
            background: #F8FAFC; padding: 30px; border-radius: 20px; border: 2px solid #E2E8F0;
        }
        .final-score { font-size: 5rem; font-family: 'Fredoka', sans-serif; color: var(--primary); margin: 15px 0; text-shadow: 3px 3px 0px rgba(255, 107, 107, 0.1);}

        @keyframes blink { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        @media (max-width: 600px) {
            body { padding: 10px; align-items: stretch; }
            .container { padding: 25px 20px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center;}
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1rem; margin-bottom: 20px;}
            .header-ujian { flex-direction: column; gap: 15px; text-align: center; padding: 15px;}
            .timer { font-size: 2rem; width: 100%; box-sizing: border-box;}
            .stats { flex-wrap: wrap; gap: 10px; }
            .stats div { flex-basis: 30%; }
            .opsi-label { padding: 14px 15px; }
            button { font-size: 1.1rem; padding: 15px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginPage" class="container">
    <h1>SYS_ASSESMEN_2026</h1>
    <h2>SMP KRISTEN BASAAN</h2>
    <div id="loadingMessage" style="text-align:center; color:var(--primary); font-family:'Fredoka', sans-serif; animation: blink 1s infinite;">[ MEMUAT DATABASE PROTOKOL... ]</div>
    
    <form id="loginForm" class="hidden" onsubmit="event.preventDefault(); doLogin();">
        <div class="form-group">
            <label>KELAS</label>
            <select id="kelas" required onchange="filterNama()">
                <option value="">[ PILIH KELAS ]</option>
            </select>
        </div>
        <div class="form-group">
            <label>ROMBEL</label>
            <select id="rombel" required>
                <option value="">[ PILIH ROMBEL ]</option>
                <option value="7A">7A</option>
                <option value="7B">7B</option>
                <option value="8A">8A</option>
                <option value="8B">8B</option>
                <option value="9A">9A</option>
                <option value="9B">9B</option>
            </select>
        </div>
        <div class="form-group">
            <label>IDENTITAS SISWA</label>
            <select id="nama" required>
                <option value="">[ PILIH NAMA ]</option>
            </select>
        </div>
        <div class="form-group">
            <label>MATA PELAJARAN</label>
            <select id="mapel" required>
                <option value="">[ PILIH MAPEL ]</option>
            </select>
        </div>
        <div class="form-group">
            <label>KODE AKSES (PASSWORD)</label>
            <input type="password" id="password" placeholder="***" required>
        </div>
        <button type="submit" id="btnLogin">INISIALISASI UJIAN</button>
    </form>
</div>

<div id="examPage" class="container hidden">
    <div class="stats">
        <div style="color:var(--success)">BENAR <span id="statBenar">0</span></div>
        <div style="color:var(--error)">SALAH <span id="statSalah">0</span></div>
        <div style="color:var(--secondary)">SISA SOAL <span id="statSisa">0</span></div>
    </div>
    
    <div class="header-ujian">
        <div>SEKTOR SOAL // <span id="nomorSoal">1</span></div>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>
    
    <div class="soal-container" id="soalKonten"></div>
    
    <button id="btnNext" disabled onclick="cekJawaban()">PROSES JAWABAN >></button>
</div>

<div id="resultPage" class="container hidden">
    <h1>SESI UJIAN SELESAI</h1>
    <h2>PROTOKOL DITUTUP</h2>
    
    <div class="score-board">
        <p style="color: var(--text-muted); margin-bottom: 0;">NILAI AKHIR</p>
        <div class="final-score" id="finalNilai">0</div>
        <hr style="border-color:#E2E8F0; border-style: dashed; margin: 25px 0;">
        <p>Total Benar: <strong style="color:var(--success)" id="finalBenar">0</strong></p>
        <p>Total Salah: <strong style="color:var(--error)" id="finalSalah">0</strong></p>
        <p>Tidak Terjawab / Batal: <strong style="color:var(--text-muted)" id="finalKosong">0</strong></p>
        <p style="margin-top: 15px; font-size:0.9rem;">Waktu Pengerjaan: <strong id="finalWaktu" style="color:var(--secondary)">-</strong></p>
    </div>
</div>

<script>
    // --- GANTI DENGAN URL WEB APP ANDA ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHtFocB20K3JBY_Wen-18Izk0QKQVCcddTko6Q_baVilh3lttBR2Bh75oTV5uaSpi-/exec'; 
    
    let allUsers = [];
    let currentSoalData = [];
    let currentIndex = 0;
    let timerInterval;
    let waktuSisa = 0;
    let waktuMulaiUjian = null; // Menambahkan variabel waktu mulai
    
    let score = { benar: 0, salah: 0, kosong: 0 };
    let userInfo = { nama: '', kelas: '', mapel: '', rombel: '' };
    let cheatCount = 0;

    function simpanProgress() {
        const progressData = {
            userInfo: userInfo,
            currentSoalData: currentSoalData,
            currentIndex: currentIndex,
            score: score,
            cheatCount: cheatCount,
            waktuMulaiUjian: waktuMulaiUjian // Simpan waktu mulai agar timer total tetap jalan jika ter-refresh
        };
        localStorage.setItem('ujianProgress_2026', JSON.stringify(progressData));
    }

    function hapusProgress() {
        localStorage.removeItem('ujianProgress_2026');
    }

    window.onload = function() {
        const savedProgress = localStorage.getItem('ujianProgress_2026');
        
        if (savedProgress) {
            if(confirm("Ditemukan sesi ujian yang terputus. Klik 'OK' untuk melanjutkan ujian terakhir Anda.")) {
                const data = JSON.parse(savedProgress);
                userInfo = data.userInfo;
                currentSoalData = data.currentSoalData;
                currentIndex = data.currentIndex;
                score = data.score;
                cheatCount = data.cheatCount || 0;
                waktuMulaiUjian = data.waktuMulaiUjian;

                document.getElementById('statBenar').innerText = score.benar;
                document.getElementById('statSalah').innerText = score.salah;

                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('examPage').classList.remove('hidden');
                initAntiCheat();
                reqFullscreen();
                tampilkanSoal();
                return; 
            } else {
                hapusProgress(); 
            }
        }

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'action=getInitData'
        }).then(res => res.json()).then(data => {
            if(data.success) {
                allUsers = data.users;
                
                let kelasSet = new Set(allUsers.map(u => u.kelas));
                kelasSet.forEach(k => {
                    document.getElementById('kelas').innerHTML += `<option value="${k}">${k}</option>`;
                });
                
                data.mapel.forEach(m => {
                    document.getElementById('mapel').innerHTML += `<option value="${m}">${m}</option>`;
                });
                
                document.getElementById('loadingMessage').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
            }
        });
    };

    function filterNama() {
        const kelasDipilih = document.getElementById('kelas').value;
        const namaSelect = document.getElementById('nama');
        namaSelect.innerHTML = '<option value="">[ PILIH NAMA ]</option>';
        allUsers.filter(u => u.kelas == kelasDipilih).forEach(u => {
            namaSelect.innerHTML += `<option value="${u.nama}">${u.nama}</option>`;
        });
    }

    function doLogin() {
        const btn = document.getElementById('btnLogin');
        btn.innerText = '[ OTENTIKASI... ]';
        btn.disabled = true;

        userInfo.nama = document.getElementById('nama').value;
        userInfo.kelas = document.getElementById('kelas').value;
        userInfo.mapel = document.getElementById('mapel').value;
        userInfo.rombel = document.getElementById('rombel').value; 
        const pwd = document.getElementById('password').value;

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=login&nama=${encodeURIComponent(userInfo.nama)}&password=${encodeURIComponent(pwd)}&mapel=${encodeURIComponent(userInfo.mapel)}`
        }).then(res => res.json()).then(data => {
            if(data.success) {
                ambilSoal();
            } else {
                alert(data.message);
                btn.innerText = 'INISIALISASI UJIAN';
                btn.disabled = false;
            }
        });
    }

    function ambilSoal() {
        document.getElementById('btnLogin').innerText = '[ MENGUNDUH DATA SOAL... ]';
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=getSoal&mapel=${encodeURIComponent(userInfo.mapel)}&kelas=${encodeURIComponent(userInfo.kelas)}`
        }).then(res => res.json()).then(data => {
            if(data.success && data.data.length > 0) {
                currentSoalData = data.data;
                waktuMulaiUjian = new Date().getTime(); // Mencatat Waktu Dimulainya Ujian
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('examPage').classList.remove('hidden');
                simpanProgress();
                initAntiCheat();
                reqFullscreen();
                tampilkanSoal();
            } else {
                alert('DATA KOSONG: Soal tidak ditemukan untuk Mapel dan Kelas ini di Server.');
                document.getElementById('btnLogin').innerText = 'INISIALISASI UJIAN';
                document.getElementById('btnLogin').disabled = false;
            }
        });
    }

    function tampilkanSoal() {
        if(currentIndex >= currentSoalData.length) {
            selesaiUjian();
            return;
        }

        const soal = currentSoalData[currentIndex];
        document.getElementById('nomorSoal').innerText = currentIndex + 1;
        document.getElementById('statSisa').innerText = currentSoalData.length - currentIndex;
        
        let htmlSoal = `<p>${soal.soal}</p>`;
        if (soal.gambar && soal.gambar.trim() !== "") {
            let imgId = soal.gambar.match(/id=([^&]+)/) || soal.gambar.match(/d\/([^/]+)/);
            if(imgId) {
                htmlSoal += `<img src="https://drive.google.com/thumbnail?id=${imgId[1]}&sz=w800" alt="Grafik Pendukung"/>`;
            }
        }

        const abcd = ['A', 'B', 'C', 'D'];
        soal.opsi.forEach((o, i) => {
            htmlSoal += `<label class="opsi-label"><input type="radio" name="jawaban" value="${abcd[i]}"> ${abcd[i]}. ${o}</label>`;
        });

        document.getElementById('soalKonten').innerHTML = htmlSoal;
        MathJax.typesetPromise(); 

        // Reset tombol ke keadaan awal
        const btnNext = document.getElementById('btnNext');
        btnNext.innerText = 'PROSES JAWABAN >>';
        btnNext.style.background = 'var(--primary)';
        btnNext.disabled = true;

        waktuSisa = parseInt(soal.timer);
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            waktuSisa--;
            let m = Math.floor(waktuSisa / 60).toString().padStart(2, '0');
            let s = (waktuSisa % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            
            if(waktuSisa <= 0) {
                clearInterval(timerInterval);
                btnNext.disabled = false;
            }
        }, 1000);
    }

    function cekJawaban() {
        const jawaban = document.querySelector('input[name="jawaban"]:checked');
        const kunci = currentSoalData[currentIndex].kunci;
        
        if (!jawaban) score.kosong++;
        else if (jawaban.value === kunci) score.benar++;
        else score.salah++;

        document.getElementById('statBenar').innerText = score.benar;
        document.getElementById('statSalah').innerText = score.salah;

        currentIndex++;
        simpanProgress();
        tampilkanSoal();
    }

    function selesaiUjian() {
        document.getElementById('examPage').classList.add('hidden');
        document.getElementById('resultPage').classList.remove('hidden');
        
        document.removeEventListener("visibilitychange", handleVisibility);
        window.removeEventListener("blur", handleBlur);
        
        // Kalkulasi Total Timer Keseluruhan Ujian
        let waktuSelesai = new Date().getTime();
        let selisihDetik = Math.floor((waktuSelesai - waktuMulaiUjian) / 1000);
        let menitPengerjaan = Math.floor(selisihDetik / 60);
        let detikPengerjaan = selisihDetik % 60;
        let durasiPengerjaan = `${menitPengerjaan} Menit ${detikPengerjaan} Detik`;

        hapusProgress();

        let totalSoal = currentSoalData.length;
        let nilaiAkhir = Math.round((score.benar / totalSoal) * 100);
        
        document.getElementById('finalNilai').innerText = nilaiAkhir;
        document.getElementById('finalBenar').innerText = score.benar;
        document.getElementById('finalSalah').innerText = score.salah;
        document.getElementById('finalKosong').innerText = score.kosong;
        document.getElementById('finalWaktu').innerText = durasiPengerjaan;
        
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=simpanHasil&rombel=${encodeURIComponent(userInfo.rombel)}&nama=${encodeURIComponent(userInfo.nama)}&benar=${score.benar}&salah=${score.salah}&kosong=${score.kosong}&nilai=${nilaiAkhir}&mapel=${encodeURIComponent(userInfo.mapel)}&timer=${encodeURIComponent(durasiPengerjaan)}`
        }).then(res => console.log('Data Nilai Berhasil Dikirim.'));
    }

    // --- SISTEM ANTI CHEAT DIAM-DIAM ---
    function initAntiCheat() {
        document.addEventListener("visibilitychange", handleVisibility);
        window.addEventListener("blur", handleBlur);
        document.addEventListener("keyup", (e) => {
            if (e.key === 'PrintScreen') laporKecurangan('Screenshot');
        });
    }

    function handleVisibility() {
        if (document.hidden) laporKecurangan('Pindah Tab/Minimize');
    }

    function handleBlur() {
        laporKecurangan('Hilang Fokus Layar');
    }

    function laporKecurangan(jenis) {
        cheatCount++;
        simpanProgress();

        // 1. Matikan timer agar tidak terlihat janggal
        clearInterval(timerInterval);
        document.getElementById('timerDisplay').innerText = "00:00";

        // 2. Kunci semua opsi jawaban dan batalkan jawaban jika sempat dipilih
        const opsiJawaban = document.querySelectorAll('input[type="radio"]');
        opsiJawaban.forEach(opsi => {
            opsi.disabled = true;
            opsi.checked = false; // Membatalkan jawaban
        });

        // 3. Paksa tombol next menjadi aktif agar siswa bisa lewat
        const btnNext = document.getElementById('btnNext');
        btnNext.disabled = false;
        btnNext.innerText = 'PELANGGARAN! LANJUT SOAL >>';
        btnNext.style.background = '#FF4757'; // Berubah jadi merah (warna error)

        // 4. Catat ke server secara diam-diam tanpa ada alert yang muncul
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=catatCurang&nama=${encodeURIComponent(userInfo.nama)}&kelas=${encodeURIComponent(userInfo.kelas)}&mapel=${encodeURIComponent(userInfo.mapel)}&keterangan=${jenis}&jumlah=${cheatCount}`
        }).catch(err => console.log('Log recorded'));
    }

    function reqFullscreen() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen(); } 
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
    }
</script>
</body>
</html>
