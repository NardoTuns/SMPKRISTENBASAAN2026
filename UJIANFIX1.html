<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ujian Online</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 18px;
      color: #333;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ff6b6b;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4b4b;
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>
      SILAGKAN KLIK TOMBOL LOGIN UJIAN UNTUK MEMULAI UJIAN
    </h1>

    <button class="btn" onclick="goHome()">
      Kembali ke Menu Utama
    </button>
  </div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
