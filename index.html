<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP Kristen Basaan - Windows 8 Style</title>
    <style>
        /* Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Helvetica, Sans-Serif;
        }

        body {
            background-color: #0078D7; /* Windows 8 Blue */
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Header Section */
        header {
            margin-bottom: 30px;
            padding-left: 5px;
        }

        h1 {
            font-weight: 300;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .location {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.4;
        }

        /* Tile Grid System */
        .tile-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Kolom untuk HP */
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .tile {
            aspect-ratio: 1 / 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: white;
            transition: transform 0.1s;
            cursor: pointer;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.1);
        }

        .tile:active {
            transform: scale(0.95);
            outline: 3px solid rgba(255,255,255,0.5);
        }

        .tile-label {
            font-size: 16px;
            font-weight: 400;
        }

        .tile-icon {
            font-size: 30px;
            margin-bottom: auto;
        }

        /* Tile Colors (Windows 8 Palette) */
        .bg-purple { background-color: #5133ab; }
        .bg-dark-blue { background-color: #2b5797; }
        .bg-green { background-color: #00a300; }
        .bg-orange { background-color: #da532c; }
        .bg-red { background-color: #b91d47; }
        .bg-teal { background-color: #00aba9; }

        /* Wide Tile (Full Width) */
        .tile-wide {
            grid-column: span 2;
            aspect-ratio: 2 / 1;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <h1>SMP Kristen Basaan</h1>
        <div class="location">
            Ratatotok, Minahasa Tenggara<br>
            Sulawesi Utara
        </div>
    </header>

    <div class="tile-container">
        <a href="#" class="tile bg-purple">
            <div class="tile-icon">🏫</div>
            <div class="tile-label">Profil Sekolah</div>
        </a>

        <a href="#" class="tile bg-dark-blue">
            <div class="tile-icon">👨‍🏫</div>
            <div class="tile-label">Profil Guru</div>
        </a>

        <a href="UJIAN.html" class="tile tile-wide bg-red">
            <div class="tile-icon">📝</div>
            <div class="tile-label">UJIAN</div>
        </a>

        <a href="#" class="tile bg-green">
            <div class="tile-icon">🎓</div>
            <div class="tile-label">Profil Siswa</div>
        </a>

        <a href="#" class="tile bg-orange">
            <div class="tile-icon">📢</div>
            <div class="tile-label">Informasi</div>
        </a>

        <a href="#" class="tile tile-wide bg-teal">
            <div class="tile-icon">🌐</div>
            <div class="tile-label">Menu Lainnya</div>
        </a>
    </div>

    <footer>
        &copy; 2026 SMP Kristen Basaan. All Rights Reserved.
    </footer>

</body>
</html>
