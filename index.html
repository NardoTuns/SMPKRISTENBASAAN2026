<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assesmen Akhir Semester 2026 - Sistem Ujian V2.0</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #00f3ff; /* Neon Cyan */
            --bg-color: #050a12; /* Dark Space */
            --panel-bg: rgba(10, 15, 30, 0.85);
            --text-main: #e2e8f0;
            --error: #ff003c; /* Neon Red */
            --success: #39ff14; /* Neon Green */
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.4);
        }
        
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            user-select: none;
            /* Background Grid Pattern */
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container { 
            width: 100%; max-width: 800px; 
            margin: 20px; padding: 30px; 
            background: var(--panel-bg); 
            border: 1px solid var(--primary); 
            border-radius: 12px; 
            box-shadow: var(--border-glow), inset 0 0 20px rgba(0,243,255,0.05); 
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        h1, h2 { 
            text-align: center; 
            font-family: 'Orbitron', sans-serif; 
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
            margin-bottom: 5px;
        }
        h2 { font-size: 1.2rem; color: #fff; text-shadow: none; margin-bottom: 25px;}

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #a5b4fc; letter-spacing: 1px;}
        
        /* Input & Select Futuristic Style */
        select, input[type="password"] { 
            width: 100%; padding: 12px; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid #1e3a8a; 
            color: var(--primary); 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px; 
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }
        select:focus, input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0,243,255,0.3);
        }

        /* Button Futuristic Style */
        button { 
            background: transparent; 
            color: var(--primary); 
            border: 2px solid var(--primary); 
            padding: 14px 20px; 
            width: 100%; 
            border-radius: 6px; 
            cursor: pointer; 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease; 
            box-shadow: inset 0 0 10px rgba(0,243,255,0.2);
            margin-top: 10px;
        }
        button:hover:not(:disabled) { 
            background: var(--primary); 
            color: #000; 
            box-shadow: 0 0 20px var(--primary); 
        }
        button:disabled { 
            border-color: #475569; color: #475569; 
            cursor: not-allowed; box-shadow: none; 
        }
        
        .hidden { display: none !important; }
        
        /* Exam UI */
        .header-ujian { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px dashed var(--primary); 
            padding-bottom: 15px; margin-bottom: 20px; 
            font-family: 'Orbitron', sans-serif;
        }
        .timer { font-size: 1.8em; font-weight: bold; color: var(--error); text-shadow: 0 0 8px rgba(255,0,60,0.5); }
        
        .soal-container { margin-bottom: 25px; font-size: 1.2rem; line-height: 1.6;}
        .soal-container img { max-width: 100%; max-height: 250px; display: block; margin: 15px 0; border: 1px solid var(--primary); border-radius: 4px;}
        
        .opsi-label { 
            display: block; padding: 12px 15px; margin: 10px 0; 
            border: 1px solid #1e3a8a; border-radius: 6px; 
            cursor: pointer; transition: 0.2s; 
            background: rgba(0,0,0,0.3);
        }
        .opsi-label:hover { 
            background: rgba(0, 243, 255, 0.1); 
            border-color: var(--primary); 
            box-shadow: inset 0 0 10px rgba(0,243,255,0.1);
        }
        input[type="radio"] { accent-color: var(--primary); width: 1.2rem; height: 1.2rem; vertical-align: middle; margin-right: 10px;}
        
        /* Stats & Cheat */
        .stats { 
            display: flex; justify-content: space-around; 
            background: rgba(0,0,0,0.6); padding: 12px; 
            border-radius: 6px; margin-bottom: 20px; 
            border: 1px solid #1e3a8a;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }
        .cheat-warning { 
            background: rgba(255, 0, 60, 0.1); color: var(--error); 
            padding: 15px; border-radius: 6px; text-align: center; 
            font-weight: bold; margin-bottom: 20px; 
            border: 1px solid var(--error); 
            box-shadow: 0 0 15px rgba(255,0,60,0.3);
            animation: blink 1s infinite alternate;
        }

        .score-board {
            text-align: center; margin-top: 30px; font-size: 1.3rem;
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; border: 1px solid var(--primary);
        }
        .final-score { font-size: 4rem; font-family: 'Orbitron', sans-serif; color: var(--primary); text-shadow: 0 0 20px var(--primary); margin: 10px 0;}

        @keyframes blink { from { opacity: 0.8; } to { opacity: 1; } }

        /* RESPONSIVE MOBILE */
        @media (max-width: 600px) {
            .container { margin: 10px; padding: 20px; border-radius: 0; border: none; border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary);}
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1rem; }
            .header-ujian { flex-direction: column; gap: 10px;}
            .timer { font-size: 2rem; }
            .stats { flex-direction: column; text-align: center; gap: 5px;}
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginPage" class="container">
    <h1>SYS_ASSESMEN_2026</h1>
    <h2>SMP KRISTEN BASAAN</h2>
    <div id="loadingMessage" style="text-align:center; color:var(--primary); font-family:'Orbitron', sans-serif; animation: blink 1s infinite;">[ MEMUAT DATABASE PROTOKOL... ]</div>
    
    <form id="loginForm" class="hidden" onsubmit="event.preventDefault(); doLogin();">
        <div class="form-group">
            <label>KELAS</label>
            <select id="kelas" required onchange="filterNama()">
                <option value="">[ PILIH KELAS ]</option>
            </select>
        </div>
        <div class="form-group">
            <label>ROMBEL</label>
            <select id="rombel" required>
                <option value="">[ PILIH ROMBEL ]</option>
                <option value="7A">7A</option>
                <option value="7B">7B</option>
                <option value="8A">8A</option>
                <option value="8B">8B</option>
                <option value="9A">9A</option>
                <option value="9B">9B</option>
            </select>
        </div>
        <div class="form-group">
            <label>IDENTITAS SISWA</label>
            <select id="nama" required>
                <option value="">[ PILIH NAMA ]</option>
            </select>
        </div>
        <div class="form-group">
            <label>MATA PELAJARAN</label>
            <select id="mapel" required>
                <option value="">[ PILIH MAPEL ]</option>
            </select>
        </div>
        <div class="form-group">
            <label>KODE AKSES (PASSWORD)</label>
            <input type="password" id="password" placeholder="***" required>
        </div>
        <button type="submit" id="btnLogin">INISIALISASI UJIAN</button>
    </form>
</div>

<div id="examPage" class="container hidden">
    <div class="cheat-warning hidden" id="cheatAlert"></div>
    
    <div class="stats">
        <div style="color:var(--success)">[ BENAR: <span id="statBenar">0</span> ]</div>
        <div style="color:var(--error)">[ SALAH: <span id="statSalah">0</span> ]</div>
        <div style="color:var(--primary)">[ SISA SOAL: <span id="statSisa">0</span> ]</div>
    </div>
    
    <div class="header-ujian">
        <div>SEKTOR SOAL // <span id="nomorSoal">1</span></div>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>
    
    <div class="soal-container" id="soalKonten"></div>
    
    <button id="btnNext" disabled onclick="cekJawaban()">PROSES JAWABAN >></button>
</div>

<div id="resultPage" class="container hidden">
    <h1>SESI UJIAN SELESAI</h1>
    <h2>PROTOKOL DITUTUP</h2>
    
    <div class="score-board">
        <p>NILAI AKHIR</p>
        <div class="final-score" id="finalNilai">0</div>
        <hr style="border-color:#1e3a8a; margin: 20px 0;">
        <p>Total Benar: <strong style="color:var(--success)" id="finalBenar">0</strong></p>
        <p>Total Salah: <strong style="color:var(--error)" id="finalSalah">0</strong></p>
        <p>Tidak Terjawab: <strong style="color:#94a3b8" id="finalKosong">0</strong></p>
    </div>
</div>

<script>
    // --- GANTI DENGAN URL WEB APP ANDA ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7EkgwfVpzMRZwByWd4sadDEhEkJ4xQwONAYIV_Eq4BgslJAXzSvIfL6RTlnkCGJtG/exec'; 
    
    let allUsers = [];
    let currentSoalData = [];
    let currentIndex = 0;
    let timerInterval;
    let waktuSisa = 0;
    
    let score = { benar: 0, salah: 0, kosong: 0 };
    let userInfo = { nama: '', kelas: '', mapel: '', rombel: '' };
    let cheatCount = 0;

    window.onload = function() {
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'action=getInitData'
        }).then(res => res.json()).then(data => {
            if(data.success) {
                allUsers = data.users;
                
                let kelasSet = new Set(allUsers.map(u => u.kelas));
                kelasSet.forEach(k => {
                    document.getElementById('kelas').innerHTML += `<option value="${k}">${k}</option>`;
                });
                
                data.mapel.forEach(m => {
                    document.getElementById('mapel').innerHTML += `<option value="${m}">${m}</option>`;
                });
                
                document.getElementById('loadingMessage').classList.add('hidden');
                document.getElementById('loginForm').classList.remove('hidden');
            }
        });
    };

    function filterNama() {
        const kelasDipilih = document.getElementById('kelas').value;
        const namaSelect = document.getElementById('nama');
        namaSelect.innerHTML = '<option value="">[ PILIH NAMA ]</option>';
        allUsers.filter(u => u.kelas == kelasDipilih).forEach(u => {
            namaSelect.innerHTML += `<option value="${u.nama}">${u.nama}</option>`;
        });
    }

    function doLogin() {
        const btn = document.getElementById('btnLogin');
        btn.innerText = '[ OTENTIKASI... ]';
        btn.disabled = true;

        userInfo.nama = document.getElementById('nama').value;
        userInfo.kelas = document.getElementById('kelas').value;
        userInfo.mapel = document.getElementById('mapel').value;
        userInfo.rombel = document.getElementById('rombel').value; // Ambil Data Rombel
        const pwd = document.getElementById('password').value;

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=login&nama=${userInfo.nama}&password=${pwd}&mapel=${userInfo.mapel}`
        }).then(res => res.json()).then(data => {
            if(data.success) {
                ambilSoal();
            } else {
                alert(data.message);
                btn.innerText = 'INISIALISASI UJIAN';
                btn.disabled = false;
            }
        });
    }

    function ambilSoal() {
        document.getElementById('btnLogin').innerText = '[ MENGUNDUH DATA SOAL... ]';
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=getSoal&mapel=${userInfo.mapel}&kelas=${userInfo.kelas}`
        }).then(res => res.json()).then(data => {
            if(data.success && data.data.length > 0) {
                currentSoalData = data.data;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('examPage').classList.remove('hidden');
                initAntiCheat();
                reqFullscreen();
                tampilkanSoal();
            } else {
                alert('DATA KOSONG: Soal tidak ditemukan untuk Mapel dan Kelas ini di Server.');
                document.getElementById('btnLogin').innerText = 'INISIALISASI UJIAN';
                document.getElementById('btnLogin').disabled = false;
            }
        });
    }

    function tampilkanSoal() {
        if(currentIndex >= currentSoalData.length) {
            selesaiUjian();
            return;
        }

        const soal = currentSoalData[currentIndex];
        document.getElementById('nomorSoal').innerText = currentIndex + 1;
        document.getElementById('statSisa').innerText = currentSoalData.length - currentIndex;
        
        let htmlSoal = `<p>${soal.soal}</p>`;
        if (soal.gambar && soal.gambar.trim() !== "") {
            let imgId = soal.gambar.match(/id=([^&]+)/) || soal.gambar.match(/d\/([^/]+)/);
            if(imgId) {
                htmlSoal += `<img src="https://drive.google.com/thumbnail?id=${imgId[1]}&sz=w800" alt="Grafik Pendukung"/>`;
            }
        }

        const abcd = ['A', 'B', 'C', 'D'];
        soal.opsi.forEach((o, i) => {
            htmlSoal += `<label class="opsi-label"><input type="radio" name="jawaban" value="${abcd[i]}"> ${abcd[i]}. ${o}</label>`;
        });

        document.getElementById('soalKonten').innerHTML = htmlSoal;
        MathJax.typesetPromise(); 

        waktuSisa = parseInt(soal.timer);
        document.getElementById('btnNext').disabled = true;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            waktuSisa--;
            let m = Math.floor(waktuSisa / 60).toString().padStart(2, '0');
            let s = (waktuSisa % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            
            if(waktuSisa <= 0) {
                clearInterval(timerInterval);
                document.getElementById('btnNext').disabled = false;
            }
        }, 1000);
    }

    function cekJawaban() {
        const jawaban = document.querySelector('input[name="jawaban"]:checked');
        const kunci = currentSoalData[currentIndex].kunci;
        
        if (!jawaban) score.kosong++;
        else if (jawaban.value === kunci) score.benar++;
        else score.salah++;

        document.getElementById('statBenar').innerText = score.benar;
        document.getElementById('statSalah').innerText = score.salah;

        currentIndex++;
        tampilkanSoal();
    }

    function selesaiUjian() {
        document.getElementById('examPage').classList.add('hidden');
        document.getElementById('resultPage').classList.remove('hidden');
        
        // Hentikan Pengawasan Anti-Cheat
        document.removeEventListener("visibilitychange", handleVisibility);
        window.removeEventListener("blur", handleBlur);
        
        // Kalkulasi Nilai: (Benar / Total Soal) * 100
        let totalSoal = currentSoalData.length;
        let nilaiAkhir = Math.round((score.benar / totalSoal) * 100);
        
        // Tampilkan di Layar
        document.getElementById('finalNilai').innerText = nilaiAkhir;
        document.getElementById('finalBenar').innerText = score.benar;
        document.getElementById('finalSalah').innerText = score.salah;
        document.getElementById('finalKosong').innerText = score.kosong;
        
        // Kirim Data ke Sheet "HASIL" via Web App
        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=simpanHasil&rombel=${userInfo.rombel}&nama=${userInfo.nama}&benar=${score.benar}&salah=${score.salah}&kosong=${score.kosong}&nilai=${nilaiAkhir}`
        }).then(res => console.log('Data Nilai Berhasil Dikirim ke Server.'));
    }

    // --- SISTEM ANTI CHEAT (TIDAK ADA POPUP) ---
    function initAntiCheat() {
        document.addEventListener("visibilitychange", handleVisibility);
        window.addEventListener("blur", handleBlur);
        document.addEventListener("keyup", (e) => {
            if (e.key === 'PrintScreen') laporKecurangan('Mencoba Screenshot (PrintScreen)');
        });
    }

    function handleVisibility() {
        if (document.hidden) laporKecurangan('Pindah Tab / Minimize Browser');
    }

    function handleBlur() {
        laporKecurangan('Aplikasi Kehilangan Fokus (Membuka Notif/Layar Lain)');
    }

    function laporKecurangan(jenis) {
        cheatCount++;
        const alertBox = document.getElementById('cheatAlert');
        alertBox.innerText = `[ PERINGATAN SISTEM ] Kecurangan terdeteksi: ${jenis}. (Total: ${cheatCount}/5)`;
        alertBox.classList.remove('hidden');

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `action=catatCurang&nama=${userInfo.nama}&kelas=${userInfo.kelas}&mapel=${userInfo.mapel}&keterangan=${jenis}&jumlah=${cheatCount}`
        }).then(res => res.json()).then(data => {
            if(data.blocked) {
                alert('AKSES DIBLOKIR: Anda telah melakukan pelanggaran 5 kali. Ujian dihentikan.');
                window.location.reload(); 
            }
        });
        
        setTimeout(() => { alertBox.classList.add('hidden'); }, 5000);
    }

    function reqFullscreen() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) { elem.requestFullscreen(); } 
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
    }
</script>
</body>
</html>
